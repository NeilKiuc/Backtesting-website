<div class="dashboard-wrapper">

  <div class="dashboard-header">
    <h1>Dashboard</h1>
    <p class="subtitle">Bienvenue sur votre plateforme de backtesting</p>
  </div>

  <div class="stats-row">
    <mat-card appearance="outlined" class="stat-card">
      <mat-card-content>
        <mat-icon>bar_chart</mat-icon>
        <p class="stat-value">3</p>
        <p class="stat-label">Stratégies disponibles</p>
      </mat-card-content>
    </mat-card>

    <mat-card appearance="outlined" class="stat-card">
      <mat-card-content>
        <mat-icon>show_chart</mat-icon>
        <p class="stat-value">3</p>
        <p class="stat-label">Marchés suivis</p>
      </mat-card-content>
    </mat-card>

    <mat-card appearance="outlined" class="stat-card">
      <mat-card-content>
        <mat-icon>history</mat-icon>
        <p class="stat-value">—</p>
        <p class="stat-label">Backtests lancés</p>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="actions-row">
    <mat-card appearance="outlined" class="action-card" routerLink="/data">
      <mat-card-content>
        <mat-icon>candlestick_chart</mat-icon>
        <p class="action-label">Données de marché</p>
      </mat-card-content>
    </mat-card>

    <mat-card appearance="outlined" class="action-card" routerLink="/backtests">
      <mat-card-content>
        <mat-icon>play_circle</mat-icon>
        <p class="action-label">Lancer un backtest</p>
      </mat-card-content>
    </mat-card>

    <mat-card appearance="outlined" class="action-card" routerLink="/results">
      <mat-card-content>
        <mat-icon>assessment</mat-icon>
        <p class="action-label">Résultats</p>
      </mat-card-content>
    </mat-card>

    <mat-card appearance="outlined" class="action-card" routerLink="/settings">
      <mat-card-content>
        <mat-icon>settings</mat-icon>
        <p class="action-label">Paramètres</p>
      </mat-card-content>
    </mat-card>
  </div>

</div>
