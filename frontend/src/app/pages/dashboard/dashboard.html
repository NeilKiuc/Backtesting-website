<div class="dashboard-wrapper">

  <div class="dashboard-header">
    <h1>Dashboard</h1>
    <p class="subtitle">Bienvenue sur votre plateforme de backtesting</p>
  </div>

  <div class="main-grid">

    <mat-card appearance="outlined" class="card-historique">
      <mat-card-content>
        <mat-icon>history</mat-icon>
        <p class="card-label">Historiques Backtests lancés</p>
      </mat-card-content>
    </mat-card>

    <mat-card appearance="outlined" class="card-strategies" routerLink="/strategies">
      <mat-card-content>
        <mat-icon>bar_chart</mat-icon>
        <p class="card-label">Stratégies</p>
      </mat-card-content>
    </mat-card>

    <mat-card appearance="outlined" class="card-marche" routerLink="/data">
      <mat-card-content>
        <mat-icon>show_chart</mat-icon>
        <p class="card-label">Marché suivis</p>
      </mat-card-content>
    </mat-card>

  </div>

</div>

<button mat-fab extended color="primary" class="fab-backtest" routerLink="/backtests">
  <mat-icon>play_arrow</mat-icon>
  Lancer un backtest
</button>
