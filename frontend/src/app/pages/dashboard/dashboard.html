<div class="dashboard-wrapper">

  <!-- Header -->
  <div class="dashboard-header">
    @if (isDemo()) {
      <h1>Bienvenue</h1>
      <p class="subtitle">Vous êtes en mode démo — connectez-vous pour sauvegarder vos backtests.</p>
    } @else {
      <h1>Bonjour, {{ user()?.username }} 👋</h1>
      <p class="subtitle">Voici un résumé de votre activité</p>
    }
  </div>

  <div class="main-grid">

    <mat-card appearance="outlined" class="card-historique">
      <mat-card-content>
        <mat-icon>history</mat-icon>
        <p class="card-label">Historiques Backtests lancés</p>
      </mat-card-content>
    </mat-card>

    <mat-card appearance="outlined" class="card-strategies" routerLink="/strategies">
      <mat-card-content>
        <mat-icon>bar_chart</mat-icon>
        <p class="card-label">Stratégies</p>
      </mat-card-content>
    </mat-card>

    <mat-card appearance="outlined" class="card-marche" routerLink="/data">
      <mat-card-content>
        <mat-icon>assessment</mat-icon>
        <p>Résultats</p>
      </mat-card-content>
    </mat-card>

    <mat-card appearance="outlined" class="action-card" routerLink="/settings">
      <mat-card-content>
        <mat-icon>settings</mat-icon>
        <p>Paramètres</p>
      </mat-card-content>
    </mat-card>
  </div>

</div>

<button mat-fab extended color="primary" class="fab-backtest" routerLink="/backtests">
  <mat-icon>play_arrow</mat-icon>
  Lancer un backtest
</button>
