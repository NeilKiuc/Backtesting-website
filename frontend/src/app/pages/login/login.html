<div class="landing-wrapper">

  <div class="landing-card">

      <img src="assets/backtst.png" alt="logo" class="logo" />
      <h1>Backtesting</h1>
      <p class="subtitle">Testez vos stratégies de trading sur des données historiques</p>
    </div>

    <div class="actions">
      <button mat-raised-button class="btn-google" (click)="loginWithGoogle()">
        Se connecter avec Google

      <div class="divider">
        <span>ou</span>
      </div>

      <button mat-stroked-button class="btn-demo" (click)="enterDemo()">

      </button>
    </div>

    <p class="disclaimer">Le mode démo ne sauvegarde pas vos backtests.</p>

  </div>

</div>
