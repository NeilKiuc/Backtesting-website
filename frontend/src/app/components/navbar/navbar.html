<mat-sidenav-container class="layout-container">

  <mat-sidenav #sidenav
    [mode]="isMobile() ? 'over' : 'side'"
    [opened]="!isMobile()"
    class="sidebar">
    <mat-toolbar color="primary">
      <span class="app-title" routerLink="">
        <img src="assets/backtst.png" alt="Backtesting App Logo"> Backtst
      </span>
    </mat-toolbar>

    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" (click)="closeSidenavIfMobile()">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/data" (click)="closeSidenavIfMobile()">
        <mat-icon matListItemIcon>data_usage</mat-icon>
        <span matListItemTitle>Data</span>
      </a>
      <a mat-list-item routerLink="/backtests" (click)="closeSidenavIfMobile()">
        <mat-icon matListItemIcon>analytics</mat-icon>
        <span matListItemTitle>Backtests</span>
      </a>
      <a mat-list-item routerLink="/results" (click)="closeSidenavIfMobile()">
        <mat-icon matListItemIcon>bar_chart</mat-icon>
        <span matListItemTitle>Results</span>
      </a>
      <a mat-list-item routerLink="/settings" (click)="closeSidenavIfMobile()">
        <mat-icon matListItemIcon>settings</mat-icon>
        <span matListItemTitle>Settings</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>

    <mat-toolbar class="topbar">
      @if (isMobile()) {
        <button mat-icon-button (click)="sidenav.toggle()" class="hamburger">
          <mat-icon>menu</mat-icon>
        </button>
      }
      <span class="spacer"></span>

      @if (isDemo()) {
        <span class="demo-badge">Mode démo</span>
        <button mat-stroked-button (click)="logout()">Se connecter</button>
      } @else if (user()) {
        <button mat-button [matMenuTriggerFor]="userMenu" class="user-btn">
          <mat-icon>account_circle</mat-icon>
          <span class="username-label">{{ user()!.username }}</span>
          <mat-icon>arrow_drop_down</mat-icon>
        </button>

        <mat-menu #userMenu="matMenu">
          <div class="menu-header">
            <span class="menu-name">{{ user()!.username }}</span>
            <span class="menu-email">{{ user()!.email }}</span>
          </div>
          <mat-divider />
          <button mat-menu-item (click)="goSettings()">
            <mat-icon>settings</mat-icon>
            Paramètres
          </button>
          <button mat-menu-item (click)="logout()" class="logout-item">
            <mat-icon>logout</mat-icon>
            Se déconnecter
          </button>
        </mat-menu>
      }
    </mat-toolbar>

    <div class="page-content">
      <router-outlet></router-outlet>
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
